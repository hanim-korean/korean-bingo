<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean Numbers – Flashcards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --coral: #E8604C;
    --teal: #2E9E8A;
    --slate: #3D4A5C;
    --gold: #C8902A;
    --purple: #7C5CBF;
    --bg: #F7F5F2;
    --card-bg: #FFFFFF;
    --text: #1A1A2E;
    --muted: #6B7280;
    --border: #E5E7EB;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 60px;
  }

  header { text-align: center; margin-bottom: 10px; }
  header h1 { font-size: 28px; font-weight: 700; color: var(--slate); letter-spacing: -0.5px; }
  header .byline { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; }
  header p { color: var(--muted); font-size: 13px; margin-top: 6px; }

  /* mode toggle */
  .mode-toggle {
    display: flex; gap: 8px; justify-content: center; margin: 14px 0 6px;
    background: white; border: 2px solid var(--border); border-radius: 24px; padding: 4px;
    width: fit-content;
  }
  .mode-btn {
    padding: 5px 16px; border-radius: 18px; font-size: 12px; font-weight: 700;
    border: none; cursor: pointer; transition: all .2s; font-family: 'DM Sans', sans-serif;
    color: var(--muted); background: transparent;
  }
  .mode-btn.active { background: var(--slate); color: white; }

  /* category pills */
  .cats { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; margin-bottom: 22px; }
  .cat-btn {
    padding: 5px 15px; border-radius: 18px; font-size: 12px; font-weight: 700;
    border: 2px solid transparent; cursor: pointer; transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .cat-btn.active { color: white; }
  .cat-btn[data-cat="all"]    { border-color: var(--slate);  color: var(--slate); }
  .cat-btn[data-cat="sino"]   { border-color: var(--coral);  color: var(--coral); }
  .cat-btn[data-cat="native"] { border-color: var(--teal);   color: var(--teal);  }
  .cat-btn[data-cat="time"]   { border-color: var(--slate);  color: var(--slate); }
  .cat-btn[data-cat="age"]    { border-color: var(--gold);   color: var(--gold);  }
  .cat-btn[data-cat="phone"]  { border-color: var(--purple); color: var(--purple);}
  .cat-btn[data-cat="ordinal"]{ border-color: #0EA5A0;       color: #0EA5A0;      }
  .cat-btn[data-cat="all"].active    { background: var(--slate); }
  .cat-btn[data-cat="sino"].active   { background: var(--coral); }
  .cat-btn[data-cat="native"].active { background: var(--teal);  }
  .cat-btn[data-cat="time"].active   { background: var(--slate); }
  .cat-btn[data-cat="age"].active    { background: var(--gold);  }
  .cat-btn[data-cat="phone"].active  { background: var(--purple);}
  .cat-btn[data-cat="ordinal"].active{ background: #0EA5A0;      }

  /* progress */
  .progress-wrap { width: 100%; max-width: 540px; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--coral); transition: width .4s ease; }
  .progress-label { font-size: 13px; font-weight: 600; color: var(--muted); white-space: nowrap; font-family: 'DM Mono', monospace; }

  /* card */
  .card-scene { width: 100%; max-width: 540px; height: 320px; perspective: 1000px; cursor: pointer; margin-bottom: 22px; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.4,0,.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: 16px; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .card-front { background: var(--card-bg); border: 2px solid var(--border); }
  .card-back { background: var(--card-bg); border: 2px solid var(--border); transform: rotateY(180deg); }

  .card-tag { position: absolute; top: 16px; left: 20px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; color: white; }
  .tag-sino    { background: var(--coral); }
  .tag-native  { background: var(--teal);  }
  .tag-time    { background: var(--slate); }
  .tag-age     { background: var(--gold);  }
  .tag-phone   { background: var(--purple);}
  .tag-ordinal { background: #0EA5A0;      }

  .card-hint { position: absolute; top: 16px; right: 20px; font-size: 11px; color: var(--muted); }
  .card-dir  { position: absolute; bottom: 14px; right: 18px; font-size: 9px; color: var(--border); font-family: 'DM Mono', monospace; letter-spacing: 0.5px; }

  .card-question { font-family: 'Noto Sans KR', sans-serif; font-size: 64px; font-weight: 700; color: var(--slate); text-align: center; line-height: 1.1; }
  .card-question.en { font-family: 'DM Sans', sans-serif; font-size: 38px; }
  .card-question.num { font-family: 'DM Mono', monospace; font-size: 56px; color: var(--slate); }
  .card-sub { font-size: 14px; color: var(--muted); margin-top: 10px; font-weight: 500; text-align: center; }

  .card-answer-main { font-family: 'Noto Sans KR', sans-serif; font-size: 52px; font-weight: 700; text-align: center; line-height: 1.1; white-space: pre-line; }
  .card-answer-main.en { font-family: 'DM Sans', sans-serif; font-size: 38px; }
  .card-answer-rom  { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--muted); margin-top: 8px; }
  .card-answer-pron { font-size: 15px; font-weight: 600; margin-top: 5px; }
  .card-answer-note { font-size: 12px; color: var(--muted); margin-top: 9px; text-align: center; max-width: 360px; line-height: 1.55; white-space: pre-line; }

  /* nav */
  .nav { display: flex; gap: 12px; align-items: center; }
  .nav-btn { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--border); background: white; font-size: 20px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; }
  .nav-btn:hover { border-color: var(--coral); color: var(--coral); transform: scale(1.05); }
  .flip-btn { padding: 12px 32px; border-radius: 24px; background: var(--slate); color: white; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; }
  .flip-btn:hover { background: var(--coral); transform: scale(1.02); }

  .kbd-hint { margin-top: 18px; font-size: 12px; color: var(--muted); text-align: center; }
  kbd { background: var(--border); padding: 2px 6px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 11px; }
</style>
</head>
<body>

<header>
  <h1>🇰🇷 Korean Numbers</h1>
  <div class="byline">by Hanim Lee</div>
  <p>Click a card to reveal the answer</p>
</header>

<div class="mode-toggle">
  <button class="mode-btn active" id="mode-normal" onclick="setMode('normal')">Korean → Number</button>
  <button class="mode-btn" id="mode-reverse" onclick="setMode('reverse')">Number → Korean</button>
</div>

<div class="cats">
  <button class="cat-btn active" data-cat="all">All</button>
  <button class="cat-btn" data-cat="sino">Sino-Korean</button>
  <button class="cat-btn" data-cat="native">Native Korean</button>
  <button class="cat-btn" data-cat="time">Time</button>
  <button class="cat-btn" data-cat="age">Age</button>
  <button class="cat-btn" data-cat="phone">Phone</button>
  <button class="cat-btn" data-cat="ordinal">Ordinal</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="progress-label" id="prog-label">1 / 1</div>
</div>

<div class="card-scene" id="card-scene" onclick="flipCard()">
  <div class="card-inner" id="card-inner">
    <div class="card-face card-front">
      <span class="card-tag" id="card-tag-f"></span>
      <span class="card-hint">tap to reveal</span>
      <div class="card-question" id="card-q"></div>
      <div class="card-sub" id="card-sub"></div>
      <div class="card-dir" id="card-dir-f"></div>
    </div>
    <div class="card-face card-back">
      <span class="card-tag" id="card-tag-b"></span>
      <span class="card-hint">tap to flip back</span>
      <div class="card-answer-main" id="card-ans"></div>
      <div class="card-answer-rom" id="card-rom"></div>
      <div class="card-answer-pron" id="card-pron"></div>
      <div class="card-answer-note" id="card-note"></div>
    </div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" onclick="prev()">←</button>
  <button class="flip-btn" onclick="flipCard()">Flip Card</button>
  <button class="nav-btn" onclick="next()">→</button>
</div>

<div class="kbd-hint">
  <kbd>Space</kbd> flip &nbsp;·&nbsp; <kbd>←</kbd><kbd>→</kbd> navigate &nbsp;·&nbsp; <kbd>S</kbd> shuffle &nbsp;·&nbsp; <kbd>R</kbd> reverse mode
</div>

<script>
// Cards: q/qs = front (normal mode), a/rom/pron/note = back (normal mode)
// In reverse mode: front shows a (the number), back shows q (Korean word)
const ALL_CARDS = [
  // ── SINO-KOREAN ──
  { cat:'sino', q:'1', qs:'What is 1 in Sino-Korean?', a:'일', rom:'il', pron:'[일]', note:'' },
  { cat:'sino', q:'2', qs:'What is 2 in Sino-Korean?', a:'이', rom:'i', pron:'[이]', note:'⚠ "i" — standard romanization (not "ee")' },
  { cat:'sino', q:'3', qs:'What is 3 in Sino-Korean?', a:'삼', rom:'sam', pron:'[삼]', note:'' },
  { cat:'sino', q:'4', qs:'What is 4 in Sino-Korean?', a:'사', rom:'sa', pron:'[사]', note:'' },
  { cat:'sino', q:'5', qs:'What is 5 in Sino-Korean?', a:'오', rom:'o', pron:'[오]', note:'' },
  { cat:'sino', q:'6', qs:'What is 6 in Sino-Korean?', a:'육', rom:'yuk', pron:'[육]', note:'⚠ Before 월 → 유: 6월 = [유월]' },
  { cat:'sino', q:'7', qs:'What is 7 in Sino-Korean?', a:'칠', rom:'chil', pron:'[칠]', note:'' },
  { cat:'sino', q:'8', qs:'What is 8 in Sino-Korean?', a:'팔', rom:'pal', pron:'[팔]', note:'' },
  { cat:'sino', q:'9', qs:'What is 9 in Sino-Korean?', a:'구', rom:'gu', pron:'[구]', note:'' },
  { cat:'sino', q:'10', qs:'What is 10 in Sino-Korean?', a:'십', rom:'sip', pron:'[십]', note:'받침 ㅂ → links to next vowel: 십일 → [시빌]' },
  { cat:'sino', q:'16', qs:'How do you say 16? (watch the pronunciation!)', a:'십육', rom:'sib-yuk', pron:'[심뉵] ← ㄴ insertion!', note:'십 + 육 → 심뉵 (nasal assimilation)' },
  { cat:'sino', q:'20', qs:'How do you say 20 in Sino-Korean?', a:'이십', rom:'i-sip', pron:'[이십]', note:'' },
  { cat:'sino', q:'66', qs:'How do you say 66? (tricky!)', a:'육십육', rom:'yuk-sip-yuk', pron:'[육씹뉵]', note:'The middle 십 becomes [씹] before 육' },
  { cat:'sino', q:'100', qs:'How do you say 100?', a:'백', rom:'baek', pron:'[백]', note:'' },
  { cat:'sino', q:'1,000', qs:'How do you say 1,000?', a:'천', rom:'cheon', pron:'[천]', note:'' },
  { cat:'sino', q:'10,000', qs:'How do you say 10,000?', a:'만', rom:'man', pron:'[만]', note:'Korean counts in 만 units — not thousands!\n50,000 = 오만 / 120,000 = 십이만' },

  // ── NATIVE KOREAN — number shown, Korean asked ──
  { cat:'native', q:'1', qs:'What is 1 in Native Korean?', a:'하나', rom:'ha-na', pron:'[하나]', note:'Before a counter → 한: 한 개, 한 명' },
  { cat:'native', q:'2', qs:'What is 2 in Native Korean?', a:'둘', rom:'dul', pron:'[둘]', note:'Before a counter → 두: 두 개, 두 명' },
  { cat:'native', q:'3', qs:'What is 3 in Native Korean?', a:'셋', rom:'set', pron:'[셋]', note:'Before a counter → 세: 세 시, 세 개' },
  { cat:'native', q:'4', qs:'What is 4 in Native Korean?', a:'넷', rom:'net', pron:'[넷]', note:'Before a counter → 네: 네 시, 네 마리' },
  { cat:'native', q:'5', qs:'What is 5 in Native Korean?', a:'다섯', rom:'da-seot', pron:'[다섯]', note:'' },
  { cat:'native', q:'6', qs:'What is 6 in Native Korean?', a:'여섯', rom:'yeo-seot', pron:'[여섯]', note:'' },
  { cat:'native', q:'7', qs:'What is 7 in Native Korean?', a:'일곱', rom:'il-gop', pron:'[일곱]', note:'' },
  { cat:'native', q:'8', qs:'What is 8 in Native Korean?', a:'여덟', rom:'yeo-deol', pron:'[여덟]', note:'ㄼ 받침 → final consonant sounds like [l]' },
  { cat:'native', q:'9', qs:'What is 9 in Native Korean?', a:'아홉', rom:'a-hop', pron:'[아홉]', note:'' },
  { cat:'native', q:'10', qs:'What is 10 in Native Korean?', a:'열', rom:'yeol', pron:'[열]', note:'' },
  { cat:'native', q:'20', qs:'What is 20 in Native Korean?\n(+ when do you use 스무?)', a:'스물', rom:'seu-mul', pron:'[스물]', note:'Standalone: 스물 · Before noun: 스무\n스무 살 ✔ / 스물 살 ✗' },
  { cat:'native', q:'30', qs:'What is 30 in Native Korean?', a:'서른', rom:'seo-reun', pron:'[서른]', note:'' },
  { cat:'native', q:'40', qs:'What is 40 in Native Korean?', a:'마흔', rom:'ma-heun', pron:'[마흔]', note:'' },
  { cat:'native', q:'50', qs:'What is 50 in Native Korean?', a:'쉰', rom:'swin', pron:'[쉰]', note:'' },
  { cat:'native', q:'60', qs:'What is 60 in Native Korean?', a:'예순', rom:'ye-sun', pron:'[예순]', note:'' },
  { cat:'native', q:'70', qs:'What is 70 in Native Korean?', a:'일흔', rom:'il-heun', pron:'[일흔]', note:'' },
  { cat:'native', q:'80', qs:'What is 80 in Native Korean?', a:'여든', rom:'yeo-deun', pron:'[여든]', note:'' },
  { cat:'native', q:'90', qs:'What is 90 in Native Korean?', a:'아흔', rom:'a-heun', pron:'[아흔]', note:'Native Korean stops at 99 — 100+ uses Sino-Korean only' },
  { cat:'native', q:'99', qs:'What is 99 in Native Korean?', a:'아흔아홉', rom:'a-heun-a-hop', pron:'[아흔아홉]', note:'Last number in Native Korean series!' },

  // ── TIME ──
  { cat:'time', q:'3:45', qs:'How do you say 3:45?', a:'세 시 사십오 분', rom:'se si / sa-sip-o bun', pron:'[세 시 사시보 분]', note:'Hours → Native Korean · Minutes → Sino-Korean' },
  { cat:'time', q:'12:00', qs:'How do you say 12 o\'clock?', a:'열두 시', rom:'yeol-du si', pron:'[열두 시]', note:'열두 = 열(10) + 두(2)' },
  { cat:'time', q:'30분', qs:'30분 in Korean numbers?', a:'삼십 분', rom:'sam-sip bun', pron:'[삼십 분]', note:'Minutes always use Sino-Korean' },
  { cat:'time', q:'3:30 shortcut', qs:'How do most Koreans say 3:30?', a:'세 시 반', rom:'se si ban', pron:'[세 시 반]', note:'반(半) = 30 minutes — much more natural in speech!' },
  { cat:'time', q:'시 vs 시간', qs:'What\'s the difference between 시 and 시간?', a:'시 = point\n시간 = duration', rom:'si / si-gan', pron:'', note:'세 시에 만나요 (at 3)\n세 시간 걸려요 (for 3 hours)' },
  { cat:'time', q:'6월', qs:'How do you pronounce 6월?', a:'유월', rom:'yu-wol', pron:'[유월] ✔  [육월] ✗', note:'육 → 유 before 월 — irregular exception!' },
  { cat:'time', q:'10월', qs:'How do you pronounce 10월?', a:'시월', rom:'si-wol', pron:'[시월] ✔  [십월] ✗', note:'십 → 시 before 월 — irregular exception!' },

  // ── AGE ──
  { cat:'age', q:'스무 살 vs 이십 세', qs:'Which is more formal for age 20?', a:'이십 세', rom:'i-sip se', pron:'', note:'살 = everyday · 세 = formal/official\n(hospital, documents, public records)' },
  { cat:'age', q:'52 살', qs:'How do you say age 52 (everyday)?', a:'쉰두 살', rom:'swin-du sal', pron:'[쉰두 살]', note:'쉰(50) + 두(2) + 살' },
  { cat:'age', q:'74 세', qs:'How do you say age 74 (formal)?', a:'칠십사 세', rom:'chil-sip-sa se', pron:'', note:'' },
  { cat:'age', q:'환갑', qs:'환갑 = ?', a:'60세', rom:'hwan-gap', pron:'[환갑]', note:'Important traditional milestone — 60th birthday celebration' },
  { cat:'age', q:'칠순 / 고희', qs:'칠순 and 고희 = ?', a:'70세', rom:'chil-sun / go-hui', pron:'', note:'칠순 = common · 고희(古稀) = formal/literary' },
  { cat:'age', q:'팔순 / 구순', qs:'팔순, 구순 = ?', a:'80세 / 90세', rom:'pal-sun / gu-sun', pron:'', note:'' },

  // ── PHONE ──
  { cat:'phone', q:'010', qs:'How do you read 010 in a phone number?', a:'공일공', rom:'gong-il-gong', pron:'[공일공]', note:'Phone numbers: use 공 for 0, NOT 영' },
  { cat:'phone', q:'213\n(phone digit)', qs:'How do you avoid 이/일 confusion in 213?', a:'이 · 일 · 삼', rom:'i · il · sam', pron:'', note:'Say each digit with a slight pause between!\nDO NOT say 이일삼 (sounds like gibberish)' },
  { cat:'phone', q:'영 vs 공', qs:'When to use 영 vs 공 for zero?', a:'영 → math\n공 → phone/address', rom:'yeong / gong', pron:'', note:'영 대 영 (0:0 score) · 영하 오도 (−5°C)\n공일공-xxxx (phone) · 302호 → 삼공이호' },
  { cat:'phone', q:'010-2345-6789', qs:'Read this full number aloud', a:'공일공\n이삼사오\n육칠팔구', rom:'gong-il-gong / i-sam-sa-o / yuk-chil-pal-gu', pron:'', note:'Each segment is read as individual digits' },

  // ── ORDINAL ──
  { cat:'ordinal', q:'1st', qs:'How do you say "first" in Korean?', a:'첫 번째', rom:'cheot beon-jjae', pron:'[첫 번째]', note:'⚠ 첫 is IRREGULAR — not 한 번째!' },
  { cat:'ordinal', q:'2nd', qs:'How do you say "second"?', a:'두 번째', rom:'du beon-jjae', pron:'[두 번째]', note:'둘 → 두 (shortened before counter)' },
  { cat:'ordinal', q:'3rd', qs:'How do you say "third"?', a:'세 번째', rom:'se beon-jjae', pron:'[세 번째]', note:'셋 → 세 (shortened before counter)' },
  { cat:'ordinal', q:'4th', qs:'How do you say "fourth"?', a:'네 번째', rom:'ne beon-jjae', pron:'[네 번째]', note:'넷 → 네 (shortened before counter)' },
  { cat:'ordinal', q:'5th+', qs:'Pattern for 5th and beyond?', a:'다섯 번째\n여섯 번째…', rom:'da-seot beon-jjae', pron:'', note:'From 5th onward: Native Korean number + 번째\nNo shortening needed!' },
  { cat:'ordinal', q:'번째 rule', qs:'What\'s the ordinal pattern in Korean?', a:'Native # + 번째', rom:'beon-jjae', pron:'[번째]', note:'첫(1st) is irregular\n둘→두 / 셋→세 / 넷→네 for 2nd–4th\n5th+ uses full Native form' },
];

let filtered = [...ALL_CARDS];
let idx = 0;
let isFlipped = false;
let currentCat = 'all';
let mode = 'normal'; // 'normal' = Korean→Number, 'reverse' = Number→Korean

function getColorForCat(cat) {
  return { sino:'#E8604C', native:'#2E9E8A', time:'#3D4A5C', age:'#C8902A', phone:'#7C5CBF', ordinal:'#0EA5A0' }[cat] || '#3D4A5C';
}
function getLabelForCat(cat) {
  return { sino:'Sino-Korean', native:'Native Korean', time:'Time', age:'Age', phone:'Phone Numbers', ordinal:'Ordinal' }[cat] || cat;
}

function renderCard() {
  if (!filtered.length) return;
  const c = filtered[idx];
  const color = getColorForCat(c.cat);
  const label = getLabelForCat(c.cat);

  // Determine front/back based on mode
  // In 'normal' mode: front = q (Korean/concept), back = a (number/answer)
  // In 'reverse' mode for sino/native: front = a (number), back = q (Korean)
  // For other cats (time/age/phone/ordinal): always normal direction
  const canReverse = (c.cat === 'sino' || c.cat === 'native');
  const useReverse = (mode === 'reverse' && canReverse);

  const frontText = useReverse ? c.a : c.q;
  const frontSub  = useReverse ? ('What is ' + c.a + ' in ' + (c.cat === 'sino' ? 'Sino' : 'Native') + '-Korean?') : c.qs;
  const backText  = useReverse ? c.q : c.a;
  const backRom   = useReverse ? '' : (c.rom || '');
  const backPron  = useReverse ? (c.rom ? c.rom : '') : (c.pron || '');
  const backPronFull = useReverse ? (c.pron || '') : (c.pron || '');
  const backNote  = c.note || '';

  // Tags
  ['card-tag-f','card-tag-b'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = label;
    el.className = 'card-tag tag-' + c.cat;
    el.style.background = color;
  });

  // Front
  const qEl = document.getElementById('card-q');
  qEl.textContent = frontText;
  const isNum = /^[\d,\s:]+$/.test(frontText.trim());
  const isEn  = /^[a-zA-Z\s\d:,.\/\-'?]+$/.test(frontText.trim());
  qEl.className = 'card-question' + (isNum ? ' num' : (isEn ? ' en' : ''));
  document.getElementById('card-sub').textContent = frontSub || '';
  document.getElementById('card-dir-f').textContent = useReverse ? '# → 한국어' : (canReverse ? '한국어 → #' : '');

  // Back
  const ansEl = document.getElementById('card-ans');
  ansEl.textContent = backText;
  ansEl.style.color = color;
  const backIsKo = /[가-힣]/.test(backText);
  const backIsEn = /^[a-zA-Z\s\d:,.\/\-'?≠·×✔✗]+$/.test(backText.trim());
  ansEl.className = 'card-answer-main' + (backIsEn && !backIsKo ? ' en' : '');

  document.getElementById('card-rom').textContent  = useReverse ? (c.pron || '') : (c.rom || '');
  document.getElementById('card-pron').textContent = useReverse ? '' : (c.pron || '');
  document.getElementById('card-pron').style.color = color;
  document.getElementById('card-note').textContent = backNote;

  // progress
  const pct = filtered.length > 1 ? (idx / (filtered.length - 1)) * 100 : 100;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog').style.background = color;
  document.getElementById('prog-label').textContent = (idx+1) + ' / ' + filtered.length;

  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-normal').classList.toggle('active', m === 'normal');
  document.getElementById('mode-reverse').classList.toggle('active', m === 'reverse');
  renderCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
}
function next() { idx = (idx + 1) % filtered.length; renderCard(); }
function prev() { idx = (idx - 1 + filtered.length) % filtered.length; renderCard(); }
function shuffle() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  idx = 0; renderCard();
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    filtered = currentCat === 'all' ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.cat === currentCat);
    idx = 0; renderCard();
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  else if (e.key === 's' || e.key === 'S') shuffle();
  else if (e.key === 'r' || e.key === 'R') setMode(mode === 'normal' ? 'reverse' : 'normal');
});

renderCard();
</script>
</body>
</html>
